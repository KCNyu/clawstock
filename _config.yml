title: clawstock
description: kcn 的 openclaw 投资分析 workspace — harness 化 cron + Tier 3 swarm
theme: jekyll-theme-minimal
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# 排除技术文件 / 内部状态
exclude:
  - "*.py"
  - "*.sh"
  - "*.lock"
  - .gitignore
  - .api_keys
  - .cache/
  - data_cache/
  - venv/
  - __pycache__/
  - "*.pyc"
  - scripts/
  - SESSION_HANDOFF.md
  - DREAMS.md
  - HEARTBEAT.md
  - finance-ai-demo/
  - testgen-go/

# 让 Jekyll 渲染这些目录 + 静态资源
include:
  - memory
  - skills
  - assets

# 默认 layout
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Author
author:
  name: kcn
  github: KCNyu
