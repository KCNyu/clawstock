title: clawstock
description: kcn 的 openclaw 投资分析 workspace — harness 化 cron + Tier 3 swarm
theme: jekyll-theme-minimal
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# 排除技术文件 / 内部状态
exclude:
  - "*.py"
  - "*.sh"
  - "*.lock"
  - .gitignore
  - .api_keys
  - .cache/
  - data_cache/
  - venv/
  - __pycache__/
  - "*.pyc"
  - scripts/
  - SESSION_HANDOFF.md
  - DREAMS.md
  - HEARTBEAT.md
  - finance-ai-demo/
  - testgen-go/

# 让 Jekyll 渲染这些目录 + 静态资源
include:
  - memory
  - skills
  - assets

# 关闭 optional_front_matter 插件——避免给 skills/SKILL.md 和 memory/*.md
# 自动加 front matter 后被 Jekyll 当 page 处理触发 Liquid 报错（含 {%} 字面量）
# 它们改走 static files 路线，链接到 GitHub 原始视图
optional_front_matter:
  enabled: false

# 默认 layout（只对真正的 page 生效，static files 不受影响）
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Author
author:
  name: kcn
  github: KCNyu
