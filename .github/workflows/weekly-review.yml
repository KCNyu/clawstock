name: Weekly Portfolio Review (Xiaomi)

# Sunday 22:00 HKT = 14:00 UTC
on:
  schedule:
    - cron: '0 14 * * 0'
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 100

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install --quiet requests

      - name: Run weekly review (Xiaomi)
        env:
          XIAOMI_API_KEY: ${{ secrets.XIAOMI_API_KEY }}
        run: python3 scripts/data/gh_action_weekly_review.py

      - name: Commit + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add memory/weekly/
          if ! git diff --cached --quiet; then
            git commit -m "memory: weekly review (xiaomi) $(date -u +%Y-W%V)"
            for i in 1 2 3; do
              git push && break
              git pull --rebase origin master
              sleep $((i*3))
            done
          fi
