name: Sentiment Scan

# Daily 23:30 UTC (= 07:30 HKT, ~30 min before brief).
# Per-ticker sentiment from FREE public sources:
#   • Reddit JSON   (US: wsb / stocks / investing)
#   • Google News RSS (US: English; HK: 中文 by Chinese name + EN by ticker)
# Writes assets/data/sentiment.json (consumed by agent Mode 5 + dashboard).
# Tavily / scrapling reserved for ad-hoc deeper queries.
on:
  schedule:
    - cron: '30 23 * * 1-5'  # weekdays only — sentiment moves on trading days
  workflow_dispatch:

# Serialize with other commit-pushing workflows
concurrency:
  group: data-write
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install --quiet requests

      - name: Scan sentiment (Reddit + Google News)
        run: python3 scripts/data/fetch_sentiment.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/sentiment.json
          if git diff --cached --quiet; then
            echo "no change"
            exit 0
          fi
          # sentiment.json changed → rebuild dashboard so its embedded sentiment block
          # doesn't go stale until the next host rebuild (no intraday rebuild on weekends).
          python3 scripts/data/build_dashboard.py
          git add assets/data/dashboard.json
          git commit -m "sentiment: daily Reddit + Google News scan $(date -u +%Y-%m-%d) + dashboard rebuild"
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "push attempt $i lost race, rebasing…"
            git pull --rebase origin master
            sleep $((i*2))
          done
          echo "push failed after retries"
          exit 1
