name: Sentiment Scan

# 21:30 UTC Sun–Thu = 05:30 HKT Mon–Fri, ~2.5h before the 08:00 HKT (00:00 UTC) brief.
# Scheduled this early to absorb GH Actions' typical 1–2h scheduled-cron delay — a job
# nominally 30 min before the brief used to land AFTER the punctual openclaw brief.
# Per-ticker sentiment from FREE public sources:
#   • Reddit JSON   (US: wsb / stocks / investing)
#   • Google News RSS (US: English; HK: 中文 by Chinese name + EN by ticker)
# Writes assets/data/sentiment.json (consumed by agent Mode 5 + dashboard).
on:
  schedule:
    # dow 0-4 not 1-5: 21:30 UTC + 8h wraps to the next HKT day → 1-5 would fire Tue–Sat,
    # missing Monday. Verify with: ./check_crons.sh --timeline
    - cron: '30 21 * * 0-4'
  workflow_dispatch:

# Serialize with other commit-pushing workflows
concurrency:
  group: data-write
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install --quiet requests

      - name: Scan sentiment (Reddit + Google News)
        run: python3 scripts/data/fetch_sentiment.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/sentiment.json
          if git diff --cached --quiet; then
            echo "no change"
            exit 0
          fi
          # sentiment.json changed → rebuild dashboard so its embedded sentiment block
          # doesn't go stale until the next host rebuild (no intraday rebuild on weekends).
          python3 scripts/data/build_dashboard.py
          git add assets/data/dashboard.json
          git commit -m "sentiment: daily Reddit + Google News scan $(date -u +%Y-%m-%d) + dashboard rebuild"
          bash scripts/data/safe_push.sh
