name: Macro Scan

# 23:45 UTC Sun–Thu = 07:45 HKT Mon–Fri, 15 min before the 08:00 HKT brief.
# dow is 0-4 (NOT 1-5): GH Action cron is UTC, and 23:45 UTC + 8h wraps to the NEXT
# HKT day — so 1-5 (Mon–Fri UTC) would fire Tue–Sat HKT and MISS Monday's brief.
# Verify any schedule change with: ./check_crons.sh --timeline
# VIX / 10Y yield / DXY / Fear & Greed / major indices snapshot.
# Free public APIs, no key. Writes assets/data/macro.json — consumed by
# brief preflight as macro context.
on:
  schedule:
    - cron: '45 23 * * 0-4'
  workflow_dispatch:

# Serialize with other commit-pushing workflows
concurrency:
  group: data-write
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install --quiet requests

      - name: Fetch macro
        run: python3 scripts/data/fetch_macro.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/macro.json
          if git diff --cached --quiet; then
            echo "no change"
            exit 0
          fi
          # macro.json changed → rebuild dashboard so its embedded macro block doesn't
          # go stale until the next host rebuild (no intraday rebuild on weekends).
          python3 scripts/data/build_dashboard.py
          git add assets/data/dashboard.json
          git commit -m "macro: daily snapshot $(date -u +%Y-%m-%d) + dashboard rebuild"
          bash scripts/data/safe_push.sh
