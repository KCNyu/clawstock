name: US News Digest (Xiaomi)

# 工作日 21:00 HKT = 13:00 UTC, 美股开盘前 30 分钟
on:
  schedule:
    - cron: '0 13 * * 1-5'
  workflow_dispatch:

concurrency:
  group: data-write
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install --quiet requests

      - name: Fetch news + Xiaomi distill
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          XIAOMI_API_KEY: ${{ secrets.XIAOMI_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: python3 scripts/data/gh_action_news_digest.py

      - name: Commit + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/us_news_digest.json
          if ! git diff --cached --quiet; then
            git commit -m "news: US digest (xiaomi) $(TZ=Asia/Hong_Kong date +%Y-%m-%d)"
            bash scripts/data/safe_push.sh
          fi
