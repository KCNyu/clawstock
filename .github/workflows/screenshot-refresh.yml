name: Dashboard Screenshot Refresh

# Re-screenshot the live dashboard each week so README preview never drifts >7 days.
# Sundays 22:00 UTC (= 06:00 Mon HKT, just before Monday's first cron).
on:
  schedule:
    - cron: '0 22 * * 0'
  workflow_dispatch:

# Serialize with other commit-pushing workflows
concurrency:
  group: data-write
  cancel-in-progress: false

jobs:
  shoot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright + Chromium
        run: |
          npm install --silent playwright@1.60.0
          npx playwright install --with-deps chromium

      - name: Capture desktop + mobile
        run: |
          mkdir -p docs
          NODE_PATH="$GITHUB_WORKSPACE/node_modules" node scripts/data/shoot_dashboard.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/dashboard-preview.png docs/dashboard-mobile.png
          if git diff --cached --quiet; then
            echo "no visual change"
            exit 0
          fi
          git commit -m "docs: weekly dashboard screenshot refresh $(date -u +%Y-%m-%d)"
          bash scripts/data/safe_push.sh
