# testgen pipeline configuration example
# Copy to config.yaml and fill in your values.

repo_path: /path/to/your/go/service
workers: 4           # parallel workers; suggest CPU count
max_retries: 3       # LLM fix attempts before giving up on a function
target_coverage: 80  # overall % coverage to reach before stopping (0 = run all)
min_priority: 0.3    # skip very trivial/already-covered functions

# Optional: restrict to specific sub-packages (relative paths)
# packages:
#   - internal/service
#   - internal/handler

llm:
  provider: openai      # openai | anthropic | ollama
  model: gpt-4o         # or claude-3-5-sonnet-20241022 / codellama
  api_key: ""           # falls back to OPENAI_API_KEY env var
  base_url: ""          # leave empty for default; set for proxy / local endpoint
  timeout: 120          # seconds per LLM call
