<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<meta name="color-scheme" content="dark">
<title>{{ page.title | default: site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="{{ '/assets/dashboard.css' | relative_url }}">
</head>
<body class="content-page">

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="i-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m7 14 4-4 4 4 5-5"/></symbol>
    <symbol id="i-grid" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></symbol>
    <symbol id="i-clipboard" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></symbol>
    <symbol id="i-book" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></symbol>
    <symbol id="i-github" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.4 5.4 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></symbol>
  </defs>
</svg>

<header class="hero hero-compact">
  <div class="hero-row">
    <a class="brand" href="{{ '/' | relative_url }}">
      <span class="brand-logo"><svg width="18" height="18"><use href="#i-logo"/></svg></span>
      <div class="brand-text">
        <h1>clawock</h1>
        <span class="tagline">harness · HK + US portfolio</span>
      </div>
    </a>
    <nav class="hero-nav">
      <a href="{{ '/' | relative_url }}" class="hero-nav-link {% if page.url == '/' or page.url == '/index.html' %}active{% endif %}"><svg><use href="#i-grid"/></svg><span>Dashboard</span></a>
      <a href="{{ '/briefs.html' | relative_url }}" class="hero-nav-link {% if page.url contains 'briefs' %}active{% endif %}"><svg><use href="#i-clipboard"/></svg><span>Briefs</span></a>
      <a href="{{ '/README.html' | relative_url }}" class="hero-nav-link {% if page.url contains 'README' %}active{% endif %}"><svg><use href="#i-book"/></svg><span>README</span></a>
      <a href="https://github.com/KCNyu/clawock" class="hero-nav-link" target="_blank" rel="noopener"><svg><use href="#i-github"/></svg><span>GitHub</span></a>
    </nav>
  </div>
</header>

<main class="page-main">
  <article class="page-article">
    {{ content }}
  </article>
</main>

<footer>
  <p>
    <a href="https://github.com/KCNyu/clawock">clawock</a>
    · <a href="{{ '/' | relative_url }}">Dashboard</a>
    · <a href="{{ '/briefs.html' | relative_url }}">Briefs</a>
  </p>
  <p class="disclaimer">
    Not investment advice. Real positions shown. Point-in-time data. Past performance ≠ future results.
  </p>
</footer>

</body>
</html>
